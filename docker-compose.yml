services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: slidewise
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: slidewise
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slidewise"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      GIGACHAT_CREDENTIALS: ${GIGACHAT_CREDENTIALS}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-GigaChat-2-Pro}
      DATABASE_URL: postgresql+asyncpg://slidewise:${DB_PASSWORD}@db:5432/slidewise
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-20971520}

volumes:
  postgres_data:
